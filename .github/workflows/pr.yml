name: PR Build, Test & TestFlight

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.4.app
          echo "Using Xcode $(xcodebuild -version | head -1)"

      - name: Install iOS simulator runtime
        run: xcodebuild -downloadPlatform iOS

      - name: Resolve simulator destination
        id: sim
        run: |
          # Parse the UDID of a real iPhone simulator from xcodebuild -showdestinations.
          # We must exclude placeholder entries (id:dvtdevice-...:placeholder) which
          # appear first in the list and cause "unable to find a device" errors.
          SIM_ID=$(xcodebuild \
            -project UnitConverter.xcodeproj \
            -scheme UnitConverter \
            -showdestinations 2>/dev/null \
            | grep "platform:iOS Simulator" \
            | grep -v "placeholder" \
            | grep "name:iPhone" \
            | tail -1 \
            | grep -o " id:[^,}]*" \
            | sed 's/ id://' \
            | xargs)
          if [ -n "$SIM_ID" ]; then
            echo "dest=id=$SIM_ID" >> "$GITHUB_OUTPUT"
            echo "Using simulator id: $SIM_ID"
          else
            echo "dest=platform=iOS Simulator,name=iPhone 17 Pro" >> "$GITHUB_OUTPUT"
            echo "Falling back to iPhone 17 Pro"
          fi

      - name: Build & Test
        run: |
          xcodebuild test \
            -project UnitConverter.xcodeproj \
            -scheme UnitConverter \
            -destination '${{ steps.sim.outputs.dest }}' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  beta:
    name: Deploy to TestFlight
    needs: test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.4.app

      - name: Install iOS simulator runtime
        run: xcodebuild -downloadPlatform iOS

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Deploy to TestFlight
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane beta
