name: PR Build, Test & TestFlight

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - name: Install iOS simulator runtime
        run: xcodebuild -downloadPlatform iOS

      - name: Resolve simulator destination
        id: sim
        run: |
          # Use xcodebuild -showdestinations to find a truly usable simulator
          # (simctl reports devices as "available" even when the runtime isn't downloaded)
          DEST=$(xcodebuild \
            -project UnitConverter.xcodeproj \
            -scheme UnitConverter \
            -showdestinations 2>/dev/null \
            | grep "platform:iOS Simulator" \
            | head -1 \
            | grep -o "name:[^,}]*" \
            | sed 's/name://' \
            | xargs)
          if [ -z "$DEST" ]; then
            DEST=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['name']); sys.exit(0)
          " 2>/dev/null || echo "iPhone 16")
          fi
          echo "name=$DEST" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEST"

      - name: Build & Test
        run: |
          xcodebuild test \
            -project UnitConverter.xcodeproj \
            -scheme UnitConverter \
            -destination 'platform=iOS Simulator,name=${{ steps.sim.outputs.name }}' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  beta:
    name: Deploy to TestFlight
    needs: test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Deploy to TestFlight
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: bundle exec fastlane beta
